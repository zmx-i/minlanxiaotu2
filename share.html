<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行程追踪 · 民兰校途</title>
<script src="https://webapi.amap.com/maps?v=2.0&key=8c0f665e55176cd54f247f92726d1e04&plugin=AMap.Driving"></script>
<script>
(function(){
  var p = window.__SHARE_DATA__ = {};
  function parse(s) {
    if (!s) return;
    var pairs = s.split('&');
    for (var i = 0; i < pairs.length; i++) {
      var eq = pairs[i].indexOf('=');
      if (eq < 0) continue;
      var k = pairs[i].slice(0, eq);
      var v = pairs[i].slice(eq + 1);
      try { v = decodeURIComponent(v); } catch(e) {}
      if (k) p[k] = v;
    }
  }
  if (location.search) parse(location.search.replace(/^\?/, ''));
  if ((!p.f || !p.t) && location.hash) {
    var h = location.hash.replace(/^#/, '').replace(/^share\?/, '');
    parse(h);
  }
  if (!p.f || !p.t) {
    var u = location.href;
    var mf = u.match(/[#?&]f=([^&?#]*)/), mt = u.match(/[#?&]t=([^&?#]*)/);
    if (mf && mt) {
      try { p.f = decodeURIComponent(mf[1]); } catch(e) { p.f = mf[1]; }
      try { p.t = decodeURIComponent(mt[1]); } catch(e) { p.t = mt[1]; }
    }
  }
  var cls = p.f && p.t ? 'share-loaded' : 'share-error';
  document.documentElement.className = cls;
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #1a5fa8;
  --primary-dark: #134b85;
  --green: #14b87a;
  --red: #dc2626;
  --gold: #d97706;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #e8edf3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #e8edf3; z-index: 1000;
}
#main, #error-state { display: none !important; }

html.share-loaded #loading { display: none !important; }
html.share-loaded #main { display: block !important; }
html.share-loaded #error-state { display: none !important; }

html.share-error #loading { display: none !important; }
html.share-error #main { display: none !important; }
html.share-error #error-state { display: flex !important; }
html.share-error #debug-info { display: block !important; }
.spinner {
  width: 48px; height: 48px;
  border: 3px solid #cbd5e1;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  margin-top: 16px; color: var(--text-secondary); font-size: 14px;
}

.header {
  width: 100%; max-width: 480px;
  background: linear-gradient(135deg, #1a5fa8 0%, #2563eb 100%);
  color: #fff; padding: 24px 20px 32px;
  text-align: center;
  border-radius: 0 0 24px 24px;
}
.header .badge {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  padding: 4px 14px; border-radius: 100px;
  font-size: 12px; letter-spacing: 1px;
  margin-bottom: 12px;
}
.header h1 {
  font-size: 22px; font-weight: 700;
  margin-bottom: 4px;
}
.header .sub {
  font-size: 13px; opacity: 0.8;
}

.content {
  width: 100%; max-width: 480px;
  padding: 16px 16px 32px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 12px;
}

.route-card { padding: 0; }
.route-header {
  display: flex; align-items: center; padding: 16px 20px;
  border-bottom: 1px solid #f1f5f9;
}
.route-point {
  display: flex; align-items: center; gap: 10px;
  flex: 1; min-width: 0;
}
.route-dot {
  flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%;
}
.route-dot.start { background: var(--green); }
.route-dot.end { background: var(--red); }
.route-label {
  font-size: 15px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.route-arrow {
  flex-shrink: 0; margin: 0 8px; color: var(--text-secondary);
  font-size: 18px;
}

.map-area {
  position: relative; width: 100%; height: 280px;
  overflow: hidden;
}

.trip-info { padding: 16px 20px; }
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f8fafc;
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--text-secondary); }
.info-value { font-size: 14px; font-weight: 600; }
.info-value.status { 
  padding: 2px 10px; border-radius: 100px;
  font-size: 12px;
}
.info-value.status.active { background: #dcfce7; color: #16a34a; }
.info-value.status.matched { background: #dbeafe; color: #2563eb; }
.info-value.status.waiting { background: #fef9c3; color: #a16207; }

.safety {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  background: #f0fdf4;
  border-radius: 12px;
  font-size: 12px; color: #16a34a;
  margin-top: 12px;
}

.platform {
  text-align: center; padding: 20px 16px 32px;
  color: var(--text-secondary); font-size: 13px;
}
.platform strong { color: var(--primary); }

#error-state {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; text-align: center;
}
#error-state .err-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
#error-state .err-desc { font-size: 14px; color: var(--text-secondary); }
#error-state .err-icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">正在获取行程信息…</div>
</div>

<div id="error-state">
  <div class="err-icon">🔗</div>
  <div class="err-title">无法解析行程信息</div>
  <div class="err-desc">请确认链接完整，或请对方重新发送分享链接</div>
  <div id="debug-info" style="display:none;margin-top:16px;padding:12px;background:#f1f5f9;border-radius:8px;font-size:11px;color:#64748b;text-align:left;word-break:break-all;max-width:100%;overflow-x:auto;"></div>
</div>

<div id="main" style="display:none;width:100%;max-width:480px;">

  <div class="header">
    <div class="badge">实时追踪</div>
    <h1 id="h-title">行程分享</h1>
    <div class="sub" id="h-time"></div>
  </div>

  <div class="content">

    <div class="card route-card">
      <div class="route-header">
        <div class="route-point">
          <div class="route-dot start"></div>
          <div class="route-label" id="label-from">出发地</div>
        </div>
        <div class="route-arrow">→</div>
        <div class="route-point">
          <div class="route-dot end"></div>
          <div class="route-label" id="label-to">目的地</div>
        </div>
      </div>

      <div class="map-area" id="mapArea"></div>

      <div class="trip-info">
        <div class="info-row">
          <span class="info-label">司机</span>
          <span class="info-value" id="i-driver">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">车牌</span>
          <span class="info-value" id="i-plate">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">距离</span>
          <span class="info-value" id="i-km">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">预计时间</span>
          <span class="info-value" id="i-min">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">出发时间</span>
          <span class="info-value" id="i-tm">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">状态</span>
          <span class="info-value status" id="i-status">-</span>
        </div>
      </div>
    </div>

    <div class="safety">
      🛡️ 该行程由「民兰校途」平台提供安全保障，实时追踪行程状态。
    </div>

    <div class="platform">
      由 <strong>民兰校途</strong> 提供技术支持
    </div>
  </div>
</div>

<script>
(function() {
  var params = window.__SHARE_DATA__ || {};

  if (!params.f || !params.t) {
    function parseParamStr(str) {
      if (!str) return;
      var pairs = str.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var idx = pairs[i].indexOf('=');
        if (idx < 0) continue;
        var k = pairs[i].slice(0, idx), v = pairs[i].slice(idx + 1);
        try { v = decodeURIComponent(v); } catch(e) {}
        if (k) params[k] = v;
      }
    }
    if (location.search) parseParamStr(location.search.replace(/^\?/, ''));
    if ((!params.f || !params.t) && location.hash) parseParamStr(location.hash.replace(/^#/, '').replace(/^share\?/, ''));
  }

  var debugHtml = '<b>版本:</b> v4 (AMap) <br>' +
    '<b>URL:</b> ' + location.href.replace(/</g,'&lt;') + '<br>' +
    '<b>search:</b> ' + (location.search || '(无)').replace(/</g,'&lt;') + '<br>' +
    '<b>hash:</b> ' + (location.hash || '(无)').replace(/</g,'&lt;') + '<br>' +
    '<b>parsed:</b> f=' + (params.f||'(missing)') + ' t=' + (params.t||'(missing)') + '<br>' +
    '<b>keys:</b> ' + Object.keys(params).join(', ');
  document.getElementById('debug-info').innerHTML = debugHtml;

  if (!params.f || !params.t) {
    document.documentElement.className = 'share-error';
    document.getElementById('debug-info').style.display = 'block';
    return;
  }

  var fromCoord = null, toCoord = null;
  if (params.fa) {
    var fa = params.fa.split(',');
    if (fa.length === 2) fromCoord = [parseFloat(fa[0]), parseFloat(fa[1])];
  }
  if (params.ta) {
    var ta = params.ta.split(',');
    if (ta.length === 2) toCoord = [parseFloat(ta[0]), parseFloat(ta[1])];
  }

  if (!fromCoord) fromCoord = [104.125, 35.93];
  if (!toCoord) toCoord = [103.622, 36.524];

  var statusMap = {'0': 'waiting', '1': 'matched', '2': 'active', '3': 'completed', '4': 'cancelled'};
  var status = statusMap[params.st] || 'active';
  var statusLabels = {waiting: '⏳ 匹配中', matched: '🤝 已配对', active: '🟢 行程中', completed: '✅ 已完成', cancelled: '❌ 已取消'};

  document.getElementById('h-title').textContent = params.f + ' → ' + params.t;
  document.getElementById('h-time').textContent = params.tm || '';
  document.getElementById('label-from').textContent = params.f;
  document.getElementById('label-to').textContent = params.t;
  document.getElementById('i-driver').textContent = params.d || '待分配';
  document.getElementById('i-plate').textContent = params.p || '待分配';
  document.getElementById('i-km').textContent = params.km || '-';
  document.getElementById('i-min').textContent = params.min || '-';
  document.getElementById('i-tm').textContent = params.tm || '-';
  var stEl = document.getElementById('i-status');
  stEl.textContent = statusLabels[status] || '🟢 行程中';
  stEl.className = 'info-value status ' + status;

  document.documentElement.className = 'share-loaded';

  var mapInstance = null;
  var carMarker = null;

  function initMap() {
    var container = document.getElementById('mapArea');
    if (!container || !window.AMap) return;

    mapInstance = new AMap.Map(container, {
      center: [
        (fromCoord[0] + toCoord[0]) / 2,
        (fromCoord[1] + toCoord[1]) / 2
      ],
      zoom: 10,
      mapStyle: 'amap://styles/normal',
      resizeEnable: true,
      disableDefaultUI: true
    });

    var driving = new AMap.Driving({
      map: mapInstance,
      policy: AMap.DrivingPolicy.LEAST_TIME,
      hideMarkers: true
    });

    driving.search(
      new AMap.LngLat(fromCoord[0], fromCoord[1]),
      new AMap.LngLat(toCoord[0], toCoord[1]),
      function(drivingStatus, result) {
        if (drivingStatus === 'complete' && result.routes && result.routes.length > 0) {
          var route = result.routes[0];
          var path = [];
          for (var i = 0; i < route.steps.length; i++) {
            var step = route.steps[i];
            for (var j = 0; j < step.path.length; j++) {
              path.push(step.path[j]);
            }
          }

          var startMarker = new AMap.Marker({
            position: fromCoord,
            icon: new AMap.Icon({
              size: new AMap.Size(36, 36),
              image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#10b981"><circle cx="12" cy="12" r="10"/></svg>'
              ),
              imageSize: new AMap.Size(36, 36)
            }),
            label: {
              content: params.f,
              direction: 'bottom',
              offset: new AMap.Pixel(0, 8),
              style: {
                fontSize: '12px',
                fontWeight: 'bold',
                backgroundColor: 'rgba(255,255,255,0.9)',
                padding: '2px 8px',
                borderRadius: '4px',
                border: '1px solid #e5e7eb'
              }
            }
          });

          var endMarker = new AMap.Marker({
            position: toCoord,
            icon: new AMap.Icon({
              size: new AMap.Size(36, 36),
              image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ef4444"><circle cx="12" cy="12" r="10"/></svg>'
              ),
              imageSize: new AMap.Size(36, 36)
            }),
            label: {
              content: params.t,
              direction: 'bottom',
              offset: new AMap.Pixel(0, 8),
              style: {
                fontSize: '12px',
                fontWeight: 'bold',
                backgroundColor: 'rgba(255,255,255,0.9)',
                padding: '2px 8px',
                borderRadius: '4px',
                border: '1px solid #e5e7eb'
              }
            }
          });

          carMarker = new AMap.Marker({
            position: fromCoord,
            icon: new AMap.Icon({
              size: new AMap.Size(48, 48),
              image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect x="8" y="24" width="48" height="28" rx="6" fill="#ef4444"/><circle cx="16" cy="48" r="6" fill="#374151"/><circle cx="48" cy="48" r="6" fill="#374151"/><rect x="18" y="30" width="10" height="8" rx="2" fill="#fcd34d"/><rect x="36" y="30" width="10" height="8" rx="2" fill="#fcd34d"/><circle cx="32" cy="20" r="6" fill="#374151"/></svg>'
              ),
              imageSize: new AMap.Size(48, 48)
            }),
            offset: new AMap.Pixel(-24, -24)
          });

          mapInstance.add([startMarker, endMarker, carMarker]);

          carMarker.moveAlong(path, {
            duration: 30000,
            autoRotation: true,
            trail: {
              strokeColor: '#ef4444',
              strokeWidth: 4,
              path: path,
              duration: 2000
            }
          });
        }
      }
    );
  }

  function checkMapReady() {
    if (window.AMap) {
      initMap();
    } else {
      setTimeout(checkMapReady, 200);
    }
  }

  setTimeout(checkMapReady, 300);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      if (carMarker) {
        carMarker.stopMove();
      }
    } else {
      checkMapReady();
    }
  });

})();
</script>
</body>
</html>
